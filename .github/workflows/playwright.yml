trigger:
  branches:
    include:
      - main
      - master

pr:
  branches:
    include:
      - main
      - master

pool:
  vmImage: 'ubuntu-latest'

variables:
  node_version: '20'
  # Set this in Pipeline Variables or Variable Group if you use Microsoft Playwright Testing
  # PLAYWRIGHT_SERVICE_URL: 'wss://...'

steps:
  - checkout: self
    clean: true

  - task: UseNode@1
    displayName: 'Use Node.js $(node_version)'
    inputs:
      version: '$(node_version)'

  - script: |
      node -v
      npm -v
    displayName: 'Show Node and npm versions'

  - script: npm ci
    displayName: 'Install dependencies'

  - script: npx playwright install --with-deps
    displayName: 'Install Playwright browsers'

  # If your project needs a build step, uncomment this:
  # - script: npm run build
  #   displayName: 'Build application'

  - script: |
      npx playwright test --reporter=line,junit,html
    displayName: 'Run Playwright tests'
    env:
      CI: 'true'
      # Uncomment if you use Microsoft Playwright Testing service
      # PLAYWRIGHT_SERVICE_URL: $(PLAYWRIGHT_SERVICE_URL)

  - task: PublishTestResults@2
    displayName: 'Publish test results'
    condition: succeededOrFailed()
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: '**/junit.xml'
      searchFolder: '$(System.DefaultWorkingDirectory)'
      mergeTestResults: true
      failTaskOnFailedTests: true
      testRunTitle: 'Playwright Test Results'

  - task: PublishPipelineArtifact@1
    displayName: 'Publish Playwright HTML report'
    condition: succeededOrFailed()
    inputs:
      targetPath: 'playwright-report'
      artifact: 'playwright-report'
      publishLocation: 'pipeline'
